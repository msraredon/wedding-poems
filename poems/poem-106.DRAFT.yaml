notes: >-
  Trans. Haleh Liza Gafori, "Water" (NYRB, 2025) — in copyright. First line small caps
  (poem start). Spans pp.58-59, captured as ONE small, angled two-page spread. The
  opening stanzas (top of p.58) and the p.59 tail are legible; the LOWER HALF of p.58
  (the "Melodies… / What do you feed the mind…" stanzas) is small and uncertain — the
  reconstruction below is provisional. RESHOOT p.58 close-up to confirm, then rename to
  poem-106.yaml. NOTE: this is the poem the old deleted poem-004.DRAFT referenced;
  confirmed here it is from "Water" (not "Gold").
text: |
  WON'T YOU praise Love?
  Won't you praise its virtues, charms, allurements?

  Love shows its face—
  its warmth and mercy.
  The torn world reunites.

  Love, you are wine.
  We are jugs.
  You are water.
  We are the stream.

  Arriving from no side,
  you stand on every side.

  How then does my heart walk towards you?
  How do my eyes find you?
  What words can I say to draw words from your lips?

  Love, what did you whisper in the ear of the heart
  to make it bloom with laughter?

  Melodies are pouring out of an empty reed—
  honey is dripping from a hive—
  what did you feed the musicians and bees
  to make the honey so sweet?

  What do you feed the mind to make a mind
  kind, noble, eager to serve?

  Everywhere, earth is vivid with your colors.
  Wonder is struck with wonder.
  The heart trembles in awe.

  You are water flowing through heavy hearts,
  washing off the weight of days.
