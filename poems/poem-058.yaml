  English, kanji, romaji. Kanji transcribed from the photo — verify. (The haiku above
  it, "uguisu…/ lass from next door", had its English cut off at the top — not captured.)
text: |
  so like Girls' Day dolls
  they may be husband and wife
  first cherry blossoms

  雛に似た夫婦もあらん初櫻
  hina ni nita fūfu mo aran hatsuzakura
