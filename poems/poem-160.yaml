text: |
  As Spender tells of an "ambition…. clothed from head to foot in song."
  Rilke imagines the very being of man as a great song. And both say that
  for this song to sing through you, to be you, you must live life ever more
  widely. And that is just what ambition means: walking the ambir, going
  the limits of the perimeter in ever-growing orbits.
  I LIVE MY LIFE
  I live my life in growing orbits,
  which move out over the things of the world.
  Perhaps I can never achieve the last,
  but that will be my attempt.
  I am circling around God, around the ancient tower,
  and I have been circling for a thousand years,
  and I still don't know if I am a falcon, or a storm,
  or a great song.
  RAINER MARIA RILKE
  translated by R.B.
