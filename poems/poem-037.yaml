text: |
  Chapulín—
  wise grasshopper,
  you serve Nezahualcóyotl as a guide
  in assembling
  his miniature kingdom:
  animals from everywhere,
  as close as Ayotzinapa,
  as far as Machu Picchu.

  Chapulín—
  in the kingdom, Nezahualcóyotl becomes a bird:
  a pigeon,
  a finch,
  a hawk,
  a quail,
  an ostrich,
  an emu,
  a booted eagle,
  and a hummingbird.
  His enormous wings protect the lake.

  Chapulín—
  in the kingdom, Nezahualcóyotl becomes an animal:
  a coyote,
  a llama,
  a snake,
  a deer,
  a lizard,
  a crocodile,
  a rhinoceros,
  a leopard,
  a rabbit,
  a bison,
  a buffalo,
  and a jaguar.
  His sharp tusks defy our enemies.

  Chapulín—
  in the kingdom, Nezahualcóyotl becomes a fish:
  an axolotl,
  a rockfish,
  and a snapper.
  His agile moves defy expectation.

  Chapulín—
  in the kingdom, Nezahualcóyotl becomes myth:
  a Coyametl,
  a Tepeyólotl,
  and a Zulin.
  His dimensions are beyond conception.

  How many animals exist?
  Do they crossbreed?
  Are new ones still created?
  Is Texcoco a miniature kingdom?
  Is each of us unique?

  Chapulín—
  wise grasshopper,
  bring wind
  and fire,
  grant me peace
  and quiet.
  Offer the dwellers of Texcoco
  the magic
  of seeing
  through animal eyes.
