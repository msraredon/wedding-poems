notes: >-
  Fragment 30 (a wedding song). Trans. Rayor & Lardinois — in copyright. "..." are
  papyrus gaps; words in [brackets] are the translators' reconstructions.
text: |
  Night . . .

  Young women . . .
  celebrate all night . . .
  They sing of the love between you
  and the bride robed in violet.

  But once roused, go [call]
  the unwed men your age
  so we may see [less] sleep
  than the sweet-toned [nightingale].
