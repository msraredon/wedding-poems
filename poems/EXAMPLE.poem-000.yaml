# EXAMPLE poem record — shows the shape of every file in poems/.
# One YAML file per poem. This example is not real content; delete or ignore.
# Real files are generated by scripts/intake.py + scripts/transcribe.py.

id: poem-000
title: "The Peace of Wild Things"      # "" if not visible in the photo
author: "Wendell Berry"                 # "" if not visible in the photo
source: "wendell-berry__selected-poems" # the images/hires subfolder it came from

# Ordered list of source photos for THIS poem. Multi-page poem = multiple
# images, listed in reading order. Paths are relative to images/hires/.
images:
  - "wendell-berry__selected-poems/IMG_4821.jpg"

# Human flips this to true ONLY after eyeballing the text against the photo.
# The layout stage refuses unverified poems when config build.block_on_unverified.
verified: false

# The poem, exactly as printed. Block scalar (|) preserves every line break,
# indent, and blank line literally. Do not reflow.
text: |
  When despair for the world grows in me
  and I wake in the night at the least sound
  in fear of what my life and my children's lives may be,
  I go and lie down where the wood drake
  rests in his beauty on the water, and the great heron feeds.
