notes: >-
  Fragment 130, the famous "sweetbitter" (glukupikron) fragment. Trans. Rayor &
  Lardinois — in copyright. "seizes me –" is indented in the book.
text: |
  Once again Love, that loosener of limbs,
      seizes me –
  sweetbitter, inescapable, crawling thing.
