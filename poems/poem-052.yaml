notes: >-
  Fragment 137, a dialogue. Trans. Rayor & Lardinois — in copyright. "He says:" and
  "She says:" are italic speaker labels in the book.
text: |
  He says:
  I wish to tell you something, but shame
  prevents me . . . .
  She says:
  If you longed for something noble or good
  and your tongue were not stirring up evil,
  then shame would not close your eyes
  and you would speak according to justice.
