text: |
  Closes
  I stretched out
  my feet
  and pulled on
  the
  magnificent
  socks
  and
  then my shoes.
  The moral
  of my ode is this:
  beauty is twice
  beauty
  and what is good is doubly
  good
  when it is a matter of two socks
  made of wool
  in winter.
  PABLO NERUDA
  translated by R.B.
