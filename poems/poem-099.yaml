text: |
  WORLD OF water and mud,
  ever since I've known you,
  I've known trial, tribulation, and torment.

  You are a pasture for grazing donkeys,
  not the abode of Jesus.
  What am I doing in a pasture for grazing donkeys?

  Why am I here?

  World of water and mud,
  you tied my hands and feet—why?

  So I notice my hands and feet?
  So I cherish them, untie them,
  meet my liberator?

  Only when the feast was spread
  did you pour the fresh water.
  Only when the feast was spread
  did we taste the sweet water.

  World of water and mud,
  God called you a cradle.

  Infant blossom, tell me,
  how do you mature so fast?

  The breeze touches me and I open.
  Petals fall. Fruit ripens.

  While here I am,
  lifting my arms like a tree to the sky,
  praising the One who made the sky.

  but why insist on above and below
  when my Source dwells in every here and every there?
  Why ask where of everywhere?

  Turn off the tongue. Turn off the mind.
  Enter nothingness.

  See things through nothing's eyes.
