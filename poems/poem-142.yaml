text: |
  To marry well
  which would you choose,
  a girl well organized,
  refined, a friendly girl
  who wears brown shoes
  with sturdy heels?
  Or would you find
  one reckless night,
  a girl with glitter
  in her hair,
  with multicolored scarves
  of silk,
  and silver slippers
  with stiletto heels?
  A wife can make
  you old before your years,
  now choose—
  silver slippers
  or brown shoes?
