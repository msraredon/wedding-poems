text: |
  "I got you a delicious cake," said the mole.
  "Did you?"
  "Yes."
  "Where is it?"
  "I ate it," said the mole.
  "Oh."
  "But I got you another."
  "Did you? Where is that one?"
  "The same thing seems to have happened."
