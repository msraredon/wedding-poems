notes: >-
  Untitled. In copyright. Wedding-appropriate (wanting the other not to complete but to combine — 'the two of us combined could set it on fire'). Complete on one page. Structure proofread against the image: running head stripped and a stanza break added before 'and then'. Body auto-OCR'd locally via Apple Vision; wording still needs a human check (verified:false).
text: |
  i do not want to have you
  to fill the empty parts of me
  i want to be full on my own
  i want to be so complete
  i could light a whole city

  and then
  i want to have you
  cause the two of us combined
  could set it on fire
