text: |
  D
  MEN AND BIRTH:
  THE UNEXPLAINABLE
  malepractice and malcabsence issue is loneliness & limiting to-
  ers, fathers, menfriends should be with their wives, women
  morrows. men need to experience rising screams, husbands, lov-
  before. during & after, helping them weather labor and lonely
  storms, we, locating new climates & seasons working with mid.
  wives, doctors & wife allowing them to take you back to school.
  stranger's work.
  you, who thought that baby delivering was others' work,
  welcome to new seasons of wisdom.
  welcome to counting & breathing,
  to pushing & contractions,
  to urging life onward quietly &
  magnificently.
  muffled grunts interrupt sleep urging participation counting
  push pushing encouraging your mate to relax to breathe prop-
  erly, constantly setting the mental clock. in the bed at her rear
  pulling legs back enlarging womb creating unbelievable spaces
  wider urging life here. men viewing & aiding the unquestioned
  miracle on earth. sliding head first helpless struggling searching
  attacking life into waiting hands baby crying for mother & lov-
  ing touches. this is the drama, birth the maturing force that can
  transform males, making them men of conscious. making them
  better futures.
  bringers of life and partners in the fight to guarantee better
  birth
  unlocks cultural strangulation allowing
  men to feel & touch & experience
  a source of love that springs in
  smiles occasional tears and undying commitment.
  HAKI R. MADHUBUTI
  The Rag and Bone Shop of the Heart
  46
