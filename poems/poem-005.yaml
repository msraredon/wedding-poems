text: |
  "It is the worst of luck to bring
  into a new house from the old
  bread salt or broomstick."

  Salt Bread and Broom
  be still.
  I leave you guardian
  against gone places
  I have loved
  your loss
  in a green promise
  making new
  Salt
  Bread
  and Broom
  remove me from the was
  I still am
  to now
  becoming
  here this house
  forever blessed.
