text: |
  I WON'T LIE THIS PLAGUE OF GRATITUDE
  I won't lie this plague of gratitude
  is hard to bear I was comfortable
  in my native pessimism
  not this spun-
  sugar fantasy
  last night I made actual
  cake
  there were no worms in the flour no
  bloody whirls in the eggs
  afterwards the minor
  holiday below my waistband remained festive
  as ever
  when I touched two breasts
  each one
  was my favorite not long ago I was hard to even
  hug like ribbons of cartilage cut
  from a lamb I dressed in shredded roses
  and pistachio shells I drank an entire language
  and flung tar at whatever moved
  until the world cut me open like a tube of paint
  until it crushed me between its fingers
  like a hornet
  none of it was graceful
  I had to learn to love people one at a time
  singing hey diddle diddle will you suffer me
  a little
  how could they say no
  I kept
  how could they say anything
  I kept clicking
  biting their tongues
  my heels
  now I am cheery
  and Germanic like a drawer full
  of strudel I always wanted to be a saint
  but I thought I'd be one of the miserable
  ones
  a brazen bull
  sainted by pain
  burnt alive inside
  beauty
  instead I weep openly at obnoxious
  cello music comes in
  from blocks away and I lose it completely
  there is a word for these fits of incomprehensible
  when my mouth was full of cake
  delight I said it last night
