text: |
  THE WHIRLING dance leaves the heart restless for more—
  more music, more dance.

  Lit by lightning, we flash like spring clouds.

  Venus, you know this ecstasy.
  Open your generous palms to the musicians.
  Their hands—and drums—are spent!
