notes: >-
  From "The Singing Word: 168 Years of Atlantic Poetry" (ed. Walt Hunter, 2025).
  Poem by Walt Whitman (public domain; later retitled "As I Ebb'd with the Ocean of
  Life"). Only sections I–V captured (spread pp.140-141); the poem may CONTINUE past
  p.141 — pages 142+ not photographed. RESHOOT the rest to confirm, then rename to
  poem-132.yaml. Not especially wedding-appropriate (a sea-elegy).
text: |
  I.

  Elemental drifts!
  Oh, I wish I could impress others as you and the waves have just been
      impressing me!

  II.

  As I ebbed with an ebb of the ocean of life,
  As I wended the shores I know,
  As I walked where the sea-ripples wash you, Paumanok,
  Where they rustle up, hoarse and sibilant,
  Where the fierce old mother endlessly cries for her castaways,
  I, musing, late in the autumn day, gazing off southward,
  Alone, held by the eternal self of me that threatens to get the better of
      me and stifle me,
  Was seized by the spirit that trails in the lines underfoot,
  In the ruin, the sediment, that stands for all the water and all the land
      of the globe.

  III.

  Fascinated, my eyes, reverting from the south, dropped, to follow those
      slender windrows,
  Chaff, straw, splinters of wood, weeds, and the sea-gluten,
  Scum, scales from shining rocks, leaves of salt-lettuce, left by the tide.

  IV.

  Miles walking, the sound of breaking waves the other side of me,
  Paumanok, there and then as I thought the old thought of likenesses,
  These you presented to me, you fish-shaped island,
  As I wended the shores I know,
  As I walked with that eternal self of me, seeking types.

  V.

  As I wend the shores I know not,
  As I listen to the dirge, the voices of men and women wrecked,
  As I inhale the impalpable breezes that set in upon me,
  As the ocean so mysterious rolls toward me closer and closer,
  At once I find, the least thing that belongs to me, or that I see or touch,
      I know not;
  I, too, but signify a little washed-up drift,—a few sands and dead leaves
      to gather,
  Gather, and merge myself as part of the leaves and drift.
