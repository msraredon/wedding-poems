notes: >-
  Trans. Erik Lofgren (Tuttle, 2024) — in copyright. Trilingual: English, kanji,
  romaji. Kanji transcribed from the photo — verify. (Same image's top haiku
  "…ume no hana" and bottom "a single early blossom…" were both cut off — not
  captured.)
text: |
  the spirit of a plum is a beautiful woman
  the spirit of a pine is an old man

  梅の精は美人にて松の精は翁也
  ume no sei wa bijin nite matsu no sei wa okina nari
