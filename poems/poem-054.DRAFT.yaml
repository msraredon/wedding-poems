notes: >-
  DRAFT — NOT A SINGLE POEM. Fragment 103 is a scholarly list of the FIRST LINES of
  ten lost poems (e.g. "Sing of the bride with shapely feet", "Come now, holy Graces
  and Pierian Muses", "Dawn in golden sandals"), followed by fragment 103A (scraps:
  "small... / hers... / many... / until"). Individually evocative but not one
  coherent poem. Decide whether to lift any single line as a favor (e.g. "Dawn in
  golden sandals") — tell me which and I'll make it its own poem. Trans. Rayor &
  Lardinois — in copyright.
