text: |
  Our house in the hollow is hemmed in
  also by immense maple trees
  but walk a short ways to the meadows
  or up the hills and sky and skies
  shatter the world, it cannot hold
  against the gales of openness
  whose clouds appear from nowhere
  and drift away southwest.
  By the road a small daisy
  stands up among the horizons
  a still wheel of eighteen spokes
  and a yellow hub that spins.
