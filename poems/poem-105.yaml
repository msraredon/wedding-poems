text: |
  A GREAT Love settled across the land.
  May it live on forever.

  Cynics found faith.
  May faith in Love live on forever.

  In a land ravaged by its demons,
  compassion, wisdom, and intelligence rose again.
  May they lead us forever.

  My friend broke my heart, slammed the door,
  came back with compassion and remorse.
  May the change of heart last forever.

  You're all alone, savoring your wine,
  a lonely pleasure.
  Join us. Be our guest forever.

  Like a torch, Love's face fills the house with light.
  Cramped corners open to fields.
  May the fields expand forever.

  The grief-struck teach me.
  The Love-drunk teach me.
  Enthralled by their bravery, their joy, their triumph.
  I cast off my chains.
  May this freedom last forever.

  Sweet lips draw music from a hollow reed.
  Wind and sky sing.
  May the music echo on.
