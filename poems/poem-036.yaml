notes: >-
  From Skovoroda's "Garden of Divine Songs" (Song XIII), in the Andrusyshen &
  Kirkconnell anthology. Spans two photographed pages (lines 1-8, then 9-24); the
  anthology selects Song XIII and skips ahead to Song XVIII, so the continuation is
  correct. The end of Song XII (top of image 1) and start of Song XVIII (bottom of
  image 2) are spillover, not included. Public-domain original (Skovoroda d. 1794);
  translation (1963) may still be in copyright.
text: |
  Ah, grainfields soft in vernal greens
  And meadows pied with flowers rare!
  Ye valleys and ye deep ravines,
  Ye vaulted mounds and hillocks bare!

  Ye streams of water running clear!
  Ye grassy banks that softly lie!
  Ye leafy branches rising sheer
  From forests underneath the sky!

  Above the fields the lark will sing,
  In orchards chants the nightingale;
  The one flies warbling on the wing,
  One mid the branches tells her tale.

  When daylight dawns, the birds confer;
  All feathery sprites are full of songs;
  The air with music is astir,
  And every copse the notes prolongs.

  And when the sun begins to rise
  The shepherd takes his sheep to graze;
  A trembling trill in ancient wise
  Upon his pipe of reeds he plays.

  Begone, all travail of the head,
  And teeming cities, loud and hot!
  With but a humble crust of bread
  I'll gladly die in such a spot.
