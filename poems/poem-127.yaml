text: |
  "Sometimes I want to say I love you all," said the mole, "but I find it difficult."
  "Do you?" said the boy.
  "Yes, so I say something like 'I'm glad we are all here.'"
  "OK," said the boy.
  "I'm glad we are all here."
  "We are so glad you are here too."
