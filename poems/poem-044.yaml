notes: >-
  Fragment 112, a wedding song. Trans. Rayor & Lardinois — in copyright. "To the
  bride:" is an italic stage-direction in the book; "..." are papyrus gaps.
text: |
  Happy groom, the marriage that you prayed for
  has been fulfilled – the girl you prayed for you have.

  To the bride:
  Your form is graceful, eyes . . . ,
  gentle, and love flows over your alluring face
  . . . Aphrodite has honored you above all.
