text: |
  How the fruit lay at your feet
  how you dressed the wine
  cut green beans
  in a lacy network
  wound to the drum
  russet arm hairs
  in the candlelight
  we ate pom and fish rice
  with a fork and spoon.

  A short hard rain
  and the moon came up
  before we lay down together
  we toasted each other
  descendants of poets
  and woodcutters
  handsome
  untrustworthy
  and brave.
