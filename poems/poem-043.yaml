notes: >-
  Fragment 111, a wedding song ("Raise high the roof beams"). Trans. Rayor &
  Lardinois — in copyright. The "—Hymenaios!" refrain lines are indented in the book.
text: |
  Raise high the roof
      —Hymenaios, god of marriage!
  you carpenter men.
      —Hymenaios!
  The groom approaches like Ares
      —Hymenaios!
  much bigger than a big man.
      —Hymenaios!
